services:
  mysql:
    image: mysql:8.0
    container_name: quiz-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: yourpassword
      MYSQL_DATABASE: quizdb
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: ./quiz.backend
    container_name: quiz-backend
    restart: always
    environment:
      DB_TYPE: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: yourpassword
      DB_DATABASE: quizdb
    ports:
      - "4000:4000"
    depends_on:
      - mysql
    working_dir: /app

  frontend:
    build: ./quiz.frontend
    container_name: quiz-frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NODE_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      - backend
    working_dir: /app

volumes:
  mysql_data:
