services:
  mysql:
    image: mysql:8.0
    container_name: tms-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: yourpassword
      MYSQL_DATABASE: tmsdb
    ports:
      - "3307:3306"
    volumes:
      - tms_mysql_data:/var/lib/mysql

  backend:
    build: ./tms.backend
    container_name: tms-backend
    restart: always
    environment:
      DB_TYPE: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: yourpassword
      DB_DATABASE: tmsdb
    ports:
      - "4000:4000"
    depends_on:
      - mysql
    working_dir: /app

  frontend:
    build: ./tms.frontend
    container_name: tms-frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NODE_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      - backend
    working_dir: /app

volumes:
  tms_mysql_data:
